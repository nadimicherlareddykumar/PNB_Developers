groups:
  - name: pnb-backend-alerts
    rules:
      - alert: High5xxRate
        expr: sum(rate(pnb_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(pnb_http_requests_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "More than 5% of requests are failing with 5xx in the last 10 minutes."

      - alert: HighP95Latency
        expr: histogram_quantile(0.95, sum(rate(pnb_http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "P95 API latency is above 1 second."

      - alert: BackendDown
        expr: up{job="pnb-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "Prometheus cannot scrape backend metrics endpoint."
