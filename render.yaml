services:
  # Backend Web Service
  - type: web
    name: pnd-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: nadimicherlareddykumar@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: CORS_ORIGIN
        sync: false # Set this to your frontend URL after it is deployed
  # Frontend Static Site
  - type: web
    name: pnd-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your backend URL + /api after it is deployed
